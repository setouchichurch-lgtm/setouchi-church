name: Fetch YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"  # 6時間ごと
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch videos
        run: |
          curl "https://www.googleapis.com/youtube/v3/search?key=${{ secrets.YOUTUBE_API_KEY }}&channelId=UCVQQV-d7xKaWNdr5xcssFjQ&part=snippet&order=date&maxResults=5&type=video" > data.json

      - name: Convert JSON
        run: |
          jq '[.items[] | {id: .id.videoId, thumbnail: .snippet.thumbnails.high.url}]' data.json > videos.json

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos.json
          git commit -m "update videos" || echo "no changes"
          git push
